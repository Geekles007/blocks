name: Deploy site + registry

# Builds the static site (Next export, which bundles the registry under /r)
# and deploys it over FTP to the web hosting that serves https://blocks.ibird.dev.
#
# Required repository configuration (Settings → Secrets and variables → Actions):
#   Secrets:    FTP_SERVER     – FTP(S) host, e.g. ftp.ibird.dev
#               FTP_USERNAME   – FTP account user
#               FTP_PASSWORD   – FTP account password
#               FTP_SERVER_DIR – absolute path to the blocks.ibird.dev document root
#                                on the host, with a trailing slash
#                                (e.g. /public_html/ or /domains/ibird.dev/blocks/).
#
# The deploy is incremental: lftp mirror compares local vs remote and only
# uploads changed files. It does NOT pass --delete, so it never removes
# unrelated files already on the host (add --delete to the mirror if you want
# the target dir to exactly match the build output). BASE_PATH is intentionally
# left unset so the site is served from the domain root (not a /<repo> subpath
# like on GitHub Pages).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm registry:build
      - name: Build static site (+ registry under /r)
        run: pnpm --filter blocks-www build
      - name: Normalize FTP server dir
        # The action requires server-dir to end with "/". Read the secret via an
        # env var (not string-interpolated into the script) and append the slash
        # if it's missing, re-masking the result.
        env:
          RAW_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          DIR="$RAW_DIR"
          case "$DIR" in */) ;; *) DIR="$DIR/" ;; esac
          echo "::add-mask::$DIR"
          echo "FTP_DIR=$DIR" >> "$GITHUB_ENV"
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy to web hosting over FTPS (lftp)
        # Uses lftp instead of the basic-ftp-based action: that library can't
        # resume the control channel's TLS session on the data connection, and
        # this host requires it — so it reset the data socket ("ECONNRESET (data
        # socket)") on the first transfer. lftp does proper TLS session reuse.
        # `ssl:verify-certificate no` tolerates the shared host's FTP cert not
        # matching the FTP hostname (control login already proved credentials).
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set cmd:fail-exit true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 3;
            set net:timeout 20;
            open -u '$FTP_USERNAME','$FTP_PASSWORD' '$FTP_SERVER';
            mirror --reverse --verbose --parallel=1 apps/www/out/ '$FTP_DIR';
          "